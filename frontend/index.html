<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeCelSystem - クリエイターコンソール</title>
    <style>
        :root {
            --bg-color: #1e1e24;
            --panel-color: #2a2a35;
            --accent-color: #4a90e2;
            --success-color: #2ecc71;
            --text-color: #ffffff;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { margin-bottom: 5px; color: var(--accent-color); }
        .container {
            display: flex;
            gap: 30px;
            max-width: 900px;
            width: 100%;
            margin-top: 20px;
        }
        .panel {
            background-color: var(--panel-color);
            border-radius: 12px;
            padding: 25px;
            flex: 1;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #aaa; }
        select, input[type="range"] {
            width: 100%;
            padding: 10px;
            background-color: #15151c;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        /* 核心：3x3 空間マトリクスグリッド */
        .matrix-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .matrix-btn {
            background-color: #3a3a4a;
            border: 2px solid #555;
            color: white;
            padding: 20px 10px;
            font-size: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .matrix-btn:hover { background-color: #4a4a5a; border-color: var(--accent-color); }
        .matrix-btn.active {
            border-color: var(--accent-color);
            background-color: rgba(74, 144, 226, 0.2);
            box-shadow: 0 0 10px rgba(74, 144, 226, 0.5);
        }
        .matrix-btn.compiled {
            background-color: rgba(46, 204, 113, 0.2);
            border-color: var(--success-color);
        }
        .matrix-btn.compiled.active {
            background-color: rgba(46, 204, 113, 0.4);
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.6);
        }
        /* ドロップエリア */
        .drop-zone {
            border: 2px dashed #666;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            background-color: #15151c;
            transition: border 0.2s;
        }
        .drop-zone:hover { border-color: var(--accent-color); }
        .btn-build {
            display: block;
            width: 100%;
            background-color: var(--success-color);
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3);
        }
        .btn-build:hover { filter: brightness(1.1); }
        .status-bar {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            background-color: #15151c;
            font-family: monospace;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <h1>🎬 AnimeCelSystem</h1>
    <p style="color: #888; margin: 0;">イラストレーター用・直感型アセットパッカーコンソール</p>

    <div class="container">
        <div class="panel">
            <h3>1. 角度（セル）の選択</h3>
            <label>顔の向き (Pitch & Yaw マトリクス)</label>
            <div class="matrix-grid" id="matrixGrid">
                </div>

            <label>首の傾き (Roll): <span id="rollVal">0.00</span></label>
            <input type="range" id="rollSlider" min="-1" max="1" step="1" value="0">
            <div style="display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-top: -15px;">
                <span>左傾き (-1.0)</span>
                <span>正面 (0.0)</span>
                <span>右傾き (1.0)</span>
            </div>
        </div>

        <div class="panel" style="display: flex; flex-direction: column; justify-content: space-between;">
            <div>
                <h3>2. アセットの割り当て</h3>
                <label for="partSelect">対象パーツ</label>
                <select id="partSelect">
                    <option value="body">body (体・輪郭)</option>
                    <option value="eyes">eyes (目)</option>
                    <option value="mouth">mouth (口)</option>
                </select>

                <label>PNG画像のドロップ ＆ 即時コンパイル</label>
                <div class="drop-zone" id="dropZone">
                    <p id="dropText">ここにPNGファイルをドラッグ＆ドロップするか、クリックして選択</p>
                    <input type="file" id="fileInput" accept="image/png" style="display: none;">
                </div>
                <div class="status-bar" id="statusBar">状態: 待機中</div>
            </div>

            <button class="btn-build" id="btnBuild">📦 演者用データ(Zip)をビルドして出荷</button>
        </div>
    </div>

    <script>
        // デモ用に単純化した座標セルの定義 (-1.00, 0.00, 1.00 の組み合わせ)
        const angles = [
            { label: "左上", yaw: -1.0, pitch: 1.0 },  { label: "上", yaw: 0.0, pitch: 1.0 },  { label: "右上", yaw: 1.0, pitch: 1.0 },
            { label: "左",   yaw: -1.0, pitch: 0.0 },  { label: "正面", yaw: 0.0, pitch: 0.0 }, { label: "右",   yaw: 1.0, pitch: 0.0 },
            { label: "左下", yaw: -1.0, pitch: -1.0 }, { label: "下", yaw: 0.0, pitch: -1.0 }, { label: "右下", yaw: 1.0, pitch: -1.0 }
        ];

        let selectedYaw = 0.0;
        let selectedPitch = 0.0;
        let selectedRoll = 0.0;
        let compiledParameters = [];

        // 初期化
        const grid = document.getElementById("matrixGrid");
        const rollSlider = document.getElementById("rollSlider");
        const rollVal = document.getElementById("rollVal");
        const statusBar = document.getElementById("statusBar");

        // 1. 登録済みパラメータをGoから取得してグリッドを光らせる関数
        async function fetchCompiledStatus() {
            try {
                const res = await fetch('/api/parameters');
                compiledParameters = await res.json() || [];
                renderGrid();
            } catch (e) {
                console.error("ステータス取得失敗", e);
            }
        }

        // 2. マトリクスグリッドの描画
        function renderGrid() {
            grid.innerHTML = "";
            angles.forEach(a => {
                const btn = document.createElement("button");
                btn.className = "matrix-btn";
                btn.innerText = `${a.label}\n(Y:${a.yaw.toFixed(1)}, P:${a.pitch.toFixed(1)})`;

                // 現在選択中か？
                if (a.yaw === selectedYaw && a.pitch === selectedPitch) {
                    btn.classList.add("active");
                }

                // すでにDBに登録がある座標か？（Rollも一致するものがあるかチェック）
                const isCompiled = compiledParameters.some(p => 
                    p.yaw === a.yaw && p.pitch === a.pitch && p.roll === selectedRoll
                );
                if (isCompiled) {
                    btn.classList.add("compiled");
                }

                btn.onclick = () => {
                    selectedYaw = a.yaw;
                    selectedPitch = a.pitch;
                    fetchCompiledStatus(); // 再描画
                };
                grid.appendChild(btn);
            });
        }

        // スライダー操作
        rollSlider.oninput = (e) => {
            selectedRoll = parseFloat(e.target.value);
            rollVal.innerText = selectedRoll.toFixed(2);
            renderGrid();
        };

        // 3. ドラッグ＆ドロップによる自動リネーム＆アップロード処理
        const dropZone = document.getElementById("dropZone");
        const fileInput = document.getElementById("fileInput");

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => uploadFile(e.target.files[0]);

        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = "#4a90e2"; };
        dropZone.ondragleave = () => { dropZone.style.borderColor = "#666"; };
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.style.borderColor = "#666";
            if (e.dataTransfer.files.length > 0) {
                uploadFile(e.dataTransfer.files[0]);
            }
        };

        async function uploadFile(file) {
            if (!file || file.type !== "image/png") {
                statusBar.innerText = "エラー: PNG形式のみ受け付けます";
                return;
            }

            statusBar.innerText = "⏳ コンパイル中...";
            const formData = new FormData();
            formData.append("part_name", document.getElementById("partSelect").value);
            formData.append("yaw", selectedYaw);
            formData.append("pitch", selectedPitch);
            formData.append("roll", selectedRoll);
            formData.append("image", file);

            try {
                const res = await fetch("/api/upload", { method: "POST", body: formData });
                if (res.ok) {
                    statusBar.innerText = `✅ 成功: ${selectedYaw}_${selectedPitch}_${selectedRoll}.rgba をコンパイルしました！`;
                    fetchCompiledStatus(); // 画面を更新して緑色に光らせる
                } else {
                    statusBar.innerText = "❌ サーバーエラーが発生しました";
                }
            } catch (e) {
                statusBar.innerText = "❌ 通信エラーが発生しました";
            }
        }

        // 4. 出荷ボタン
        document.getElementById("btnBuild").onclick = () => {
            window.location.href = "/api/build";
        };

        // 初回読み込み
        fetchCompiledStatus();
    </script>
</body>
</html>
